services:
  mongo:
    image: mongo:7
    container_name: healthcare-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "3100:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/authdb
      JWT_SECRET: change-me-jwt-secret
      PATIENT_SERVICE_URL: http://patient-service:3001
      DOCTOR_SERVICE_URL: http://doctor-service:3002
      APPOINTMENT_SERVICE_URL: http://appointment-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3004
      VIDEO_SERVICE_URL: http://video-service:3006
    depends_on:
      mongo:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      video-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  patient-service:
    build:
      context: ./services/patient-service
    container_name: patient-service
    env_file:
      - ./services/patient-service/.env
    ports:
      - "3101:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/patientdb
      JWT_SECRET: change-me-jwt-secret
      DOCTOR_SERVICE_URL: http://doctor-service:3002
      APPOINTMENT_SERVICE_URL: http://appointment-service:3003
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  doctor-service:
    build:
      context: ./services/doctor-service
    container_name: doctor-service
    ports:
      - "3102:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo:27017/doctordb
      JWT_SECRET: change-me-jwt-secret
      EMAIL_USER: change-me-email-user
      EMAIL_PASS: change-me-email-pass
      ADMIN_EMAIL: admin@example.com
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3002/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  appointment-service:
    build:
      context: ./services/apponment-service
    container_name: appointment-service
    ports:
      - "3103:3003"
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongo:27017/appointmentdb
      DOCTOR_SERVICE_URL: http://doctor-service:3002
    depends_on:
      mongo:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3003/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  payment-service:
    build:
      context: ./services/Payment-service
    container_name: payment-service
    ports:
      - "3104:3004"
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongo:27017/paymentdb
      STRIPE_SECRET_KEY: change-me-stripe-secret
      APPOINTMENT_SERVICE_URL: http://appointment-service:3003
      DOCTOR_SERVICE_URL: http://doctor-service:3002
    depends_on:
      mongo:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const s=net.connect(3004,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  video-service:
    build:
      context: ./services/video-service
    container_name: video-service
    ports:
      - "3106:3006"
    environment:
      PORT: 3006
      MONGO_URI: mongodb://mongo:27017/videodb
      JWT_SECRET: change-me-jwt-secret
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3006/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  client:
    build:
      context: ./client
      args:
        REACT_APP_API_BASE_URL: http://localhost:3100
    container_name: healthcare-client
    ports:
      - "8082:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
