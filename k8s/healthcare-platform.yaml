apiVersion: v1
kind: Namespace
metadata:
  name: healthcare
---
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-secrets
  namespace: healthcare
type: Opaque
stringData:
  JWT_SECRET: change-me-jwt-secret
  STRIPE_SECRET_KEY: change-me-stripe-secret
  CLOUDINARY_CLOUD_NAME: change-me-cloudinary-cloud
  CLOUDINARY_API_KEY: change-me-cloudinary-key
  CLOUDINARY_API_SECRET: change-me-cloudinary-secret
  EMAIL_USER: change-me-email-user
  EMAIL_PASS: change-me-email-pass
  ADMIN_EMAIL: admin@example.com
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: healthcare
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:7
        ports:
        - containerPort: 27017
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 6
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
      volumes:
      - name: mongo-data
        persistentVolumeClaim:
          claimName: mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: healthcare
spec:
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: healthcare/api-gateway:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 12
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 25
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 6
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: PORT
          value: "3000"
        - name: MONGO_URI
          value: mongodb://mongo:27017/authdb
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: healthcare-secrets
              key: JWT_SECRET
        - name: PATIENT_SERVICE_URL
          value: http://patient-service:3001
        - name: DOCTOR_SERVICE_URL
          value: http://doctor-service:3002
        - name: APPOINTMENT_SERVICE_URL
          value: http://appointment-service:3003
        - name: PAYMENT_SERVICE_URL
          value: http://payment-service:3004
        - name: VIDEO_SERVICE_URL
          value: http://video-service:3006
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: healthcare
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30000
---
